---
- name: Prepare claude-code container
  hosts: containers
  become: yes
  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: yes

    - name: Install git, tmux, curl, zsh, nodejs, npm, gnupg, and pass
      apt:
        name:
          - git
          - tmux
          - curl
          - zsh
          - nodejs
          - npm
          - gnupg
          - pass
        state: present
    - name: Ensure docker metrics endpoint for prometheus is configured and exposed
      ansible.builtin.lineinfile:
        path: /etc/docker/daemon.json
        line: "{ \"metrics-addr\": \"0.0.0.0:9323\" }"
        state: present
        create: true
    - name: Install prometheus node exporter
      apt:
        name: prometheus-node-exporter
        state: present
    - name: Ensure node exporter is started and enabled
      ansible.builtin.service:
        name: prometheus-node-exporter
        state: started
        enabled: yes

    - name: Set zsh as default shell for root
      user:
        name: root
        shell: /bin/zsh

    - name: Install Claude Code via npm
      ansible.builtin.shell: npm install -g @anthropic-ai/claude-code
      args:
        creates: /usr/local/bin/claude

    - name: Configure Claude Code release channel to stable
      ansible.builtin.copy:
        dest: /root/.claude/settings.json
        content: |
          {
            "autoUpdatesChannel": "stable"
          }
        force: no
