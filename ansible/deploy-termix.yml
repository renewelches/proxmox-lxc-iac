---
- name: Prepare termix container
  hosts: containers
  become: yes
  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: yes

    - name: Install docker Python library (required for ansible docker modules)
      apt:
        name: python3-docker
        state: present

    - name: Ensure docker metrics endpoint for prometheus is configured and exposed
      ansible.builtin.lineinfile:
        path: /etc/docker/daemon.json
        line: "{ \"metrics-addr\": \"0.0.0.0:9323\" }"
        state: present
        create: true

    - name: Ensure docker service is restarted after config change
      ansible.builtin.service:
        name: docker
        state: restarted

- name: Deploy Termix
  hosts: termix
  become: yes
  tasks:
    - name: Create termix Docker network
      community.docker.docker_network:
        name: termix-net

    - name: Create termix data volume
      community.docker.docker_volume:
        name: termix-data

    - name: Run guacd container
      community.docker.docker_container:
        name: guacd
        image: guacamole/guacd:latest
        state: started
        pull: always
        restart_policy: unless-stopped
        networks:
          - name: termix-net

    - name: Create termix SSL directory
      ansible.builtin.file:
        path: /etc/termix/ssl
        state: directory
        mode: "0755"

    - name: Copy termix TLS certificate
      ansible.builtin.copy:
        src: files/termix/termix.crt
        dest: /etc/termix/ssl/termix.crt
        mode: "0644"

    - name: Copy termix TLS key
      ansible.builtin.copy:
        src: files/termix/termix.key
        dest: /etc/termix/ssl/termix.key
        mode: "0644"

    - name: Run Termix container
      community.docker.docker_container:
        name: termix
        image: ghcr.io/lukegus/termix:latest
        state: started
        pull: always
        restart_policy: unless-stopped
        ports:
          - "80:8080"
          - "443:443"
        env:
          PORT: "8080"
          ENABLE_SSL: "true"
          SSL_DOMAIN: "termix.grumples.home"
          SSL_CERT_PATH: "/etc/termix/ssl/termix.crt"
          SSL_KEY_PATH: "/etc/termix/ssl/termix.key"
          SSL_PORT: "443"
        volumes:
          - termix-data:/app/data
          - /etc/termix/ssl:/etc/termix/ssl:ro
          - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
        networks:
          - name: termix-net
